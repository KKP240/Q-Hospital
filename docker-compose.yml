services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_broker
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  appointment-service:
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    container_name: appointment_service
    ports:
      - "8081:8080"
    environment:
      - DB_URL=postgres://admin:admin@postgres:5432/appointment_db?sslmode=disable
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - USER_SERVICE_URL=http://user-service:8080
      - JWT_SECRET=my_super_secret_key
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  queue-patient-service:
    build: ./queue-patient-service
    container_name: queue_service
    ports:
      - "8082:8080"
    environment:
      - DB_URL=postgres://admin:admin@postgres:5432/queue_db?sslmode=disable
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-pill-service:
    build: ./payment-pill-service
    container_name: payment_service
    ports:
      - "8083:8080"
    environment:
      - DB_URL=postgres://admin:admin@postgres:5432/payment_db?sslmode=disable
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user_service
    ports:
      - "8084:8080"
    environment:
      - DB_URL=postgres://admin:admin@postgres:5432/user_db?sslmode=disable
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - JWT_SECRET=my_super_secret_key
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy