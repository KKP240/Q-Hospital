version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: hospital
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  appointment-service:
    build: ./appointment-service
    ports:
      - "8081:8080"
    environment:
      - DB_URL=postgres://admin:admin@postgres:5432/hospital?sslmode=disable
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672

  queue-patient-service:
    build: ./queue-patient-service
    ports:
      - "8082:8080"
    environment:
      - DB_URL=postgres://admin:admin@postgres:5432/hospital?sslmode=disable
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672

  payment-pill-service:
    build: ./payment-pill-service
    ports:
      - "8083:8080"
    environment:
      - DB_URL=postgres://admin:admin@postgres:5432/hospital?sslmode=disable
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672